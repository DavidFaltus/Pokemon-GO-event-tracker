  <circle cx="50" cy="50" r="46" stroke="#c084fc" stroke-width="2" stroke-opacity="0.4" fill="none" filter="url(#logo-glow)" />
  <circle cx="50" cy="50" r="42" fill="url(#pokeball-bottom)" stroke="#1e1b4b" stroke-width="2.5" />
