  <line x1="8" y1="50" x2="92" y2="50" stroke="#090d16" stroke-width="6" />
  <circle cx="50" cy="50" r="15" fill="#090d16" />
  <circle cx="50" cy="50" r="10" fill="#1e1b4b" stroke="#aa3bff" stroke-width="2" />
  <circle cx="50" cy="50" r="4" fill="#c084fc" filter="url(#logo-glow)" />
</svg>