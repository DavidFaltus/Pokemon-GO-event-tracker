      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#863bff" />
    </linearGradient>
    <linearGradient id="pokeball-bottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
